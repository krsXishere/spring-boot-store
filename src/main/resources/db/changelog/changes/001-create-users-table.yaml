databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: ikis

      changes:
        - createTable:
            tableName: users

            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

              - column:
                  name: deleted_at
                  type: timestamp with time zone

      rollback:
        - dropTable:
            tableName: users
